<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a data-testid="sidenav-search" mat-list-item routerLink="books/search">Search</a>
      <a data-testid="sidenav-books" mat-list-item routerLink="/">Books</a>
      <a data-testid="sidenav-new-book" mat-list-item routerLink="books/new">New Book</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isHandset$ | async) {
        <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <span>BOOK MONKEY</span>
    </mat-toolbar>
    <ng-content />
  </mat-sidenav-content>
</mat-sidenav-container>
